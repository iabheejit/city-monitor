<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Monitor</title>
    <meta name="description" content="Real-time city dashboard: news, weather, transit, events, and safety." />

    <!-- Open Graph -->
    <meta property="og:title" content="City Monitor" />
    <meta property="og:description" content="Real-time city dashboard: news, weather, transit, events, and safety." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://citymonitor.app/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://citymonitor.app/og-default.png" />

    <!-- Preconnect to key third-party origins -->
    <link rel="preconnect" href="https://api.citymonitor.app" crossorigin />
    <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />

    <!-- Preload CARTO map style based on theme preference -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches);
        var style = dark
          ? 'https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json'
          : 'https://basemaps.cartocdn.com/gl/positron-nolabels-gl-style/style.json';
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'fetch';
        link.crossOrigin = 'anonymous';
        link.href = style;
        document.head.appendChild(link);
      })();
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E2001A" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>City Monitor</h1>
      <p>Real-time city dashboard: news, weather, transit, events, and safety.</p>
      <p>This site requires JavaScript.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 100% privacy-first analytics -->
    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  </body>
</html>
