databases:
  - name: city-monitor-db
    plan: starter
    region: frankfurt
    databaseName: city_monitor
    user: city_monitor

services:
  # --- API Server ---
  - type: web
    name: city-monitor-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=packages/server
    startCommand: npm run db:migrate --workspace=packages/server && node packages/server/dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ACTIVE_CITIES
        value: berlin
      - key: DATA_GOV_IN_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: city-monitor-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # --- Static Frontend ---
  - type: web
    name: city-monitor-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace=packages/web
    staticPublishPath: packages/web/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=300
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://scripts.simpleanalyticscdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com https://gdi.berlin.de https://geodienste.hamburg.de https://avatars.githubusercontent.com; font-src 'self'; connect-src 'self' https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com https://gdi.berlin.de https://geodienste.hamburg.de https://queue.simpleanalyticscdn.com; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://city-monitor-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
