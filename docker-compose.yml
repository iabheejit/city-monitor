services:
  db:
    image: postgres:17
    container_name: city-monitor-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: city_monitor_dev
      POSTGRES_USER: cmdev
      POSTGRES_PASSWORD: cmdev_local
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
